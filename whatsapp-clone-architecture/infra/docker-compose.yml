version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: whatsapp
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports: ["9092:9092"]
  minio:
    image: minio/minio
    ports: ["9000:9000"]
    command: server /data
  elasticsearch:
    image: elasticsearch:8.11.0
    ports: ["9200:9200"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
  kibana:
    image: kibana:8.11.0
    ports: ["5601:5601"]
  livekit:
    image: livekit/livekit-server:v1.5.2
    ports: ["7880:7880", "7881:7881", "50000-60000:50000-60000/udp"]
    environment:
      LIVEKIT_KEYS: devkey: secret
  # App services: 4000-4030
