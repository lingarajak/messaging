version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: whatsapp
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports: ["9092:9092"]
  minio:
    image: minio/minio
    ports: ["9000:9000"]
    command: server /data
  elasticsearch:
    image: elasticsearch:8.11.0
    ports: ["9200:9200"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
  # App services: 4000-4027
