apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
      - name: chat-service
        image: your-registry/chat-service:latest
        ports:
        - containerPort: 4000
        env:
        - name: REDIS_URL
          value: redis://redis:6379
        - name: KAFKA_BROKER
          value: kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 4000
  selector:
    app: chat-service
